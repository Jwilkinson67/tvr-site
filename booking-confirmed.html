<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Received · Tennessee Valley Rentals LLC</title>
  <link rel="icon" href="assets/tvr-logo-mark.png">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #f6f7f9; font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; max-width: 520px; width: 100%; margin: 32px 16px; padding: 48px 40px; text-align: center; }
    .check { width: 64px; height: 64px; background: #1568be; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 28px; }
    h1 { font-size: 28px; color: #262626; margin: 0 0 12px; }
    p { font-size: 15px; color: #3c3c3c; line-height: 1.7; margin: 0 0 12px; }
    .note { font-size: 13px; color: #6b6b6b; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e6e6e6; }
    a.btn { display: inline-block; margin-top: 28px; background: #1568be; color: #fff; text-decoration: none; font-weight: 700; font-size: 14px; padding: 14px 32px; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="square">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Booking Request Received!</h1>
    <p>Thank you for choosing Tennessee Valley Rentals LLC. We've received your request and will review it shortly.</p>
    <p>You'll get a confirmation email once your booking is approved — usually within a few hours.</p>
    <div class="note">
      Questions? Call or text <strong>(321) 765-3077</strong>
    </div>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
