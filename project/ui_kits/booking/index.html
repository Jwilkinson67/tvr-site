<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TVR · Booking</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="icon" href="../../assets/tvr-mark.svg">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { background: #f7f7f7; }
    .booking-shell {
      max-width: 1280px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 380px; gap: 48px;
      padding: 48px 32px;
      align-items: start;
    }
    .booking-main { background: #fff; padding: 48px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const STEPS = ["Trailer", "Customer", "Documents", "Sign", "Pay", "Done"];

    function App() {
      const {
        TopBar, Stepper, OrderSummary,
        StepTrailerDates, StepCustomer, StepDocs, StepAgreement, StepPayment, StepDone,
      } = window.BK;

      const today = new Date();
      const inThree = new Date(today.getTime() + 3 * 86400 * 1000);
      const fmt = d => d.toISOString().slice(0, 10);

      const initial = {
        trailerId: "",
        pickup: fmt(today), dropoff: fmt(inThree), pickupNote: "",
        days: 3,
        name: "", email: "", phone: "", tow: "", hitch: "", purpose: "",
        docs: {},
        signature: "", agreed: false,
        card: "", exp: "", cvv: "", cardName: "", zip: "",
      };

      const [state, setState] = useState(initial);
      const [step, setStep]   = useState(0);

      const goNext = () => setStep(s => Math.min(STEPS.length - 1, s + 1));
      const goBack = () => setStep(s => Math.max(0, s - 1));
      const reset = () => { setState(initial); setStep(0); };

      const StepComp = [
        StepTrailerDates, StepCustomer, StepDocs,
        StepAgreement, StepPayment, StepDone,
      ][step];

      return (
        <div data-screen-label={"Booking · step " + (step + 1) + " · " + STEPS[step]}>
          <TopBar/>
          <Stepper steps={STEPS} current={step}/>
          <div className="booking-shell">
            <div className="booking-main">
              <StepComp state={state} setState={setState} onNext={goNext} onBack={step > 0 ? goBack : null} onReset={reset}/>
            </div>
            {step < STEPS.length - 1 && <OrderSummary state={state}/>}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
