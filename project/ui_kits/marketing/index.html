<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TVR · Marketing</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="icon" href="../../assets/tvr-mark.svg">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [route, setRoute] = useState("home");
      const { TopNav, HeroDark, FleetGrid, FleetDetail, PickupBand, CTABand, Footer, BookingHandoff } = window.MK;
      return (
        <div data-screen-label={"Marketing · " + route}>
          <TopNav route={route} setRoute={setRoute}/>
          {route === "home" && <>
            <HeroDark setRoute={setRoute}/>
            <FleetGrid setRoute={setRoute}/>
            <PickupBand setRoute={setRoute}/>
            <CTABand setRoute={setRoute}/>
          </>}
          {route === "cargo"    && <FleetDetail trailerId="cargo"  setRoute={setRoute}/>}
          {route === "hauler"   && <FleetDetail trailerId="hauler" setRoute={setRoute}/>}
          {route === "booking"  && <BookingHandoff setRoute={setRoute}/>}
          <Footer/>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
