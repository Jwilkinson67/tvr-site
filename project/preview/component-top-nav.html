<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: #fff; }
  .nav { display: flex; align-items: center; justify-content: space-between; height: 72px; padding: 0 28px; background: #fff; border-bottom: 1px solid #e6e6e6; }
  .left { display: flex; align-items: center; gap: 40px; }
  .logo img { height: 44px; display: block; }
  .menu { display: flex; gap: 28px; }
  .menu a { font: 400 14px/1.4 var(--tvr-font-sans); color: #262626; letter-spacing: 0.3px; cursor: pointer; }
  .menu a.on { color: #1568be; font-weight: 700; }
  .right { display: flex; align-items: center; gap: 20px; }
  .phone { font: 400 12px/1 var(--tvr-font-sans); color: #6b6b6b; letter-spacing: 0.5px; }
  .reserve { background: #1568be; color: #fff; height: 40px; padding: 0 22px; font: 700 13px/1 var(--tvr-font-sans); letter-spacing: 0.5px; border: 0; cursor: pointer; }
</style></head><body>
<div class="nav">
  <div class="left">
    <div class="logo"><img src="../assets/tvr-logo-primary.png" alt="TVR Tennessee Valley Rentals"/></div>
    <div class="menu">
      <a class="on">Enclosed Cargo 8.5 × 16</a>
      <a>Car Hauler / Equipment 8.5 × 20</a>
      <a>Reserve</a>
    </div>
  </div>
  <div class="right">
    <span class="phone">(321) 765-3077</span>
    <button class="reserve">Reserve</button>
  </div>
</div>
</body></html>
