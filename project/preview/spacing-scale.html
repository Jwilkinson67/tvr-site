<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #ffffff; }
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .block { background: #1568be; width: 32px; }
  .name { font: 700 10px/1 var(--tvr-font-sans); color: var(--tvr-ink); letter-spacing: 1px; text-transform: uppercase; }
  .val { font: 400 10px/1 var(--tvr-font-sans); color: var(--tvr-muted); }
</style></head><body>
<div class="scale">
  <div class="item"><div class="block" style="height:4px"></div><div class="name">xxs</div><div class="val">4</div></div>
  <div class="item"><div class="block" style="height:8px"></div><div class="name">xs</div><div class="val">8</div></div>
  <div class="item"><div class="block" style="height:12px"></div><div class="name">sm</div><div class="val">12</div></div>
  <div class="item"><div class="block" style="height:16px"></div><div class="name">md</div><div class="val">16</div></div>
  <div class="item"><div class="block" style="height:24px"></div><div class="name">lg</div><div class="val">24</div></div>
  <div class="item"><div class="block" style="height:32px"></div><div class="name">xl</div><div class="val">32</div></div>
  <div class="item"><div class="block" style="height:48px"></div><div class="name">xxl</div><div class="val">48</div></div>
  <div class="item"><div class="block" style="height:80px"></div><div class="name">section</div><div class="val">80</div></div>
</div>
</body></html>
