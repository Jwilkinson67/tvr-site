<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #ffffff; display: grid; grid-template-columns: repeat(2, auto); gap: 14px; align-items: center; justify-content: start; }
  .dark-block { background: #16264a; padding: 24px; display: flex; gap: 12px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; height: 48px; padding: 0 32px; font: 700 14px/1 var(--tvr-font-sans); letter-spacing: 0.5px; cursor: pointer; background: transparent; }
  .sec { color: #262626; border: 1px solid #cccccc; }
  .sec-dark { color: #ffffff; border: 1px solid #ffffff; }
  .link { font: 700 13px/1.3 var(--tvr-font-sans); letter-spacing: 1.5px; text-transform: uppercase; color: #262626; background: transparent; border: 0; padding: 0; cursor: pointer; }
  .label { font: 400 11px/1 var(--tvr-font-sans); color: var(--tvr-muted); letter-spacing: 1px; text-transform: uppercase; }
</style></head><body>
  <button class="btn sec">View specs</button>
  <span class="label">Secondary · on light</span>
  <div class="dark-block"><button class="btn sec-dark">View specs</button></div>
  <span class="label">Secondary · on dark</span>
  <button class="link">Learn more ›</button>
  <span class="label">Uppercase text link</span>
</body></html>
