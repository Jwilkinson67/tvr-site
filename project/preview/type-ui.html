<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: #ffffff; }
  .stack { display: grid; gap: 18px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: center; padding-bottom: 14px; border-bottom: 1px solid var(--tvr-hairline); }
  .row:last-child { border-bottom: 0; }
  .label { font: 700 10px/1 var(--tvr-font-sans); color: var(--tvr-muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .spec { font: 400 11px/1.4 var(--tvr-font-sans); color: var(--tvr-muted); margin-top: 4px; }
</style></head><body>
<div class="stack">
  <div class="row">
    <div style="font: 700 13px/1.3 var(--tvr-font-sans); letter-spacing: 1.5px; text-transform: uppercase; color: var(--tvr-ink);">View specs ›</div>
    <div><div class="label">Label · Uppercase</div><div class="spec">Inter · 700 · 13 / 1.3 · 1.5px track</div></div>
  </div>
  <div class="row">
    <div style="font: 700 14px/1 var(--tvr-font-sans); letter-spacing: 0.5px; color: var(--tvr-ink);">Reserve</div>
    <div><div class="label">Button</div><div class="spec">Inter · 700 · 14 / 1.0 · 0.5px track</div></div>
  </div>
  <div class="row">
    <div style="font: 400 14px/1.4 var(--tvr-font-sans); letter-spacing: 0.3px; color: var(--tvr-ink);">Fleet · Booking · Location · Help</div>
    <div><div class="label">Nav link</div><div class="spec">Inter · 400 · 14 / 1.4 · 0.3px track</div></div>
  </div>
  <div class="row">
    <div style="font: 400 12px/1.4 var(--tvr-font-sans); letter-spacing: 0.5px; color: var(--tvr-muted);">Tandem axle · 7,000 lb GVWR · electric brakes</div>
    <div><div class="label">Caption</div><div class="spec">Inter · 400 · 12 / 1.4 · 0.5px track</div></div>
  </div>
</div>
</body></html>
