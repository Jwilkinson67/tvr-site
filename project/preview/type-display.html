<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: #ffffff; }
  .stack { display: grid; gap: 18px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: end; padding-bottom: 16px; border-bottom: 1px solid var(--tvr-hairline); }
  .row:last-child { border-bottom: 0; }
  .label { font: 700 10px/1 var(--tvr-font-sans); color: var(--tvr-muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .spec { font: 400 11px/1.4 var(--tvr-font-sans); color: var(--tvr-muted); margin-top: 4px; }
  h1, h2, h3, h4 { margin: 0; color: var(--tvr-ink); font-family: var(--tvr-font-sans); }
</style></head><body>
<div class="stack">
  <div class="row">
    <div><h1 style="font-size:48px; font-weight:700; line-height:1.05">Display XL</h1></div>
    <div><div class="label">Display XL</div><div class="spec">Inter · 700 · 64px / 1.05 · 0 track</div></div>
  </div>
  <div class="row">
    <div><h2 style="font-size:36px; font-weight:700; line-height:1.1">Display LG</h2></div>
    <div><div class="label">Display LG</div><div class="spec">Inter · 700 · 48px / 1.10 · 0 track</div></div>
  </div>
  <div class="row">
    <div><h3 style="font-size:28px; font-weight:700; line-height:1.15">Display MD</h3></div>
    <div><div class="label">Display MD</div><div class="spec">Inter · 700 · 32px / 1.15 · 0 track</div></div>
  </div>
  <div class="row">
    <div><h4 style="font-size:22px; font-weight:700; line-height:1.25">Display SM</h4></div>
    <div><div class="label">Display SM</div><div class="spec">Inter · 700 · 24px / 1.25 · 0 track</div></div>
  </div>
</div>
</body></html>
