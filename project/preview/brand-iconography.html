<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .cell .box { width: 40px; height: 40px; border: 1px solid #e6e6e6; display: flex; align-items: center; justify-content: center; }
  .cell .name { font: 400 10px/1 var(--tvr-font-sans); color: var(--tvr-muted); letter-spacing: 0.5px; }
  .note { grid-column: 1 / -1; font: 400 12px/1.55 var(--tvr-font-sans); color: var(--tvr-muted); padding-top: 10px; border-top: 1px solid #e6e6e6; }
  .note strong { color: #262626; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-size: 11px; display: block; margin-bottom: 6px; }
</style></head><body>
