<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .cell { padding: 18px 0; border-right: 1px solid #e6e6e6; display: flex; flex-direction: column; gap: 6px; padding-left: 16px; }
  .cell:last-child { border-right: 0; }
  .v { font: 700 22px/1.1 var(--tvr-font-sans); color: var(--tvr-ink); }
  .u { font: 700 10px/1 var(--tvr-font-sans); color: var(--tvr-muted); letter-spacing: 1.5px; text-transform: uppercase; }
</style></head><body>
<div class="grid">
  <div class="cell"><span class="v">8.5 × 16</span><span class="u">Dimensions (ft)</span></div>
  <div class="cell"><span class="v">7,000 lb</span><span class="u">GVWR</span></div>
  <div class="cell"><span class="v">Tandem</span><span class="u">Axle config</span></div>
  <div class="cell"><span class="v">6'6"</span><span class="u">Interior height</span></div>
</div>
</body></html>
