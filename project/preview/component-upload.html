<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #fff; }
  .upload { border: 1px dashed #cccccc; padding: 22px; display: flex; gap: 16px; align-items: center; background: #f4f6f9; }
  .ico { width: 44px; height: 44px; border: 1px solid #cccccc; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; background: #fff; }
  .ico svg { display: block; }
  .body { display: flex; flex-direction: column; gap: 4px; }
  .ttl { font: 700 16px/1.4 var(--tvr-font-sans); color: var(--tvr-ink); }
  .sub { font: 300 13px/1.5 var(--tvr-font-sans); color: var(--tvr-muted); }
  .btn { margin-left: auto; height: 40px; padding: 0 18px; background: #fff; color: #262626; border: 1px solid #cccccc; font: 700 12px/1 var(--tvr-font-sans); letter-spacing: 0.5px; cursor: pointer; }
</style></head><body>
<div class="upload">
  <div class="ico">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1568be" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
  </div>
  <div class="body">
    <div class="ttl">Driver's license</div>
    <div class="sub">Front and back. JPG or PDF, max 10 MB.</div>
  </div>
  <button class="btn">Upload</button>
</div>
</body></html>
