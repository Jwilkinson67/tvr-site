<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TVR Trailer Safety Course — Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: "Inter", Arial, sans-serif; background: #f6f7f9; color: #262626; font-size: 15px; }
    .topbar { background: #1568be; color: #fff; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-weight: 700; font-size: 17px; }
    .topbar-sub  { font-size: 12px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; }
    .shell { max-width: 680px; margin: 40px auto; padding: 0 24px 80px; }
    .dots { display: flex; align-items: center; justify-content: center; margin-bottom: 32px; }
    .dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #d0d0d0; background: #fff; color: #9a9a9a; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; }
    .dot.active { border-color: #1568be; background: #1568be; color: #fff; }
    .dot.done   { border-color: #1568be; background: #1568be; color: #fff; }
    .dot-line   { width: 24px; height: 2px; background: #d0d0d0; }
    .dot-line.done { background: #1568be; }
    .card { background: #fff; border: 1px solid #e0e0e0; padding: 32px; margin-bottom: 20px; }
    .kicker { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #1568be; margin-bottom: 10px; }
    h2 { font-size: 24px; font-weight: 700; margin: 0 0 20px; line-height: 1.2; color: #262626; }
    .cl { list-style: none; padding: 0; margin: 0; }
    .cl li { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .cl li:last-child { border-bottom: none; }
    .ci { width: 22px; height: 22px; border-radius: 50%; background: #1568be; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .cl strong { font-size: 14px; color: #262626; display: block; margin-bottom: 2px; }
    .cl span { font-size: 13px; color: #6b6b6b; line-height: 1.5; }
    .tip  { background: #eef5ff; border-left: 3px solid #1568be; padding: 13px 16px; margin: 16px 0; font-size: 13px; color: #0b3d7a; line-height: 1.6; }
    .warn { background: #fff8e0; border-left: 3px solid #b88017; padding: 13px 16px; margin: 16px 0; font-size: 13px; color: #7a5500; line-height: 1.6; }
    .tip b, .warn b { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    .anim-box { background: #f4f6f9; border: 1px solid #e0e0e0; padding: 20px; margin: 18px 0; display: flex; flex-direction: column; align-items: center; }
    .anim-label { font-size: 12px; font-weight: 700; color: #6b6b6b; margin-top: 10px; text-align: center; letter-spacing: 0.5px; text-transform: uppercase; }
    .q-wrap { margin-bottom: 20px; }
    .q-label { font-weight: 700; font-size: 15px; margin-bottom: 10px; }
    .opt { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 2px solid #e0e0e0; margin-bottom: 7px; cursor: pointer; font-size: 14px; transition: border-color 0.12s, background 0.12s; }
    .opt:hover  { border-color: #1568be; background: #f0f6ff; }
    .opt.sel    { border-color: #1568be; background: #f0f6ff; }
    .opt.correct{ border-color: #22a355; background: #edfaf1; color: #155a30; font-weight: 600; }
    .opt.wrong  { border-color: #b5212b; background: #fdf0f0; color: #7a1018; }
    .radio { width: 15px; height: 15px; border-radius: 50%; border: 2px solid #d0d0d0; flex-shrink: 0; }
    .opt.sel .radio { border-color: #1568be; background: #1568be; }
    .coupon { background: #fff; border: 2px dashed #1568be; padding: 36px 32px; text-align: center; margin-bottom: 20px; }
    .coupon-code { display: inline-block; background: #1568be; color: #fff; font-weight: 700; font-size: 26px; letter-spacing: 5px; padding: 13px 36px; margin: 14px 0; }
    .btn { display: block; width: 100%; padding: 14px; background: #1568be; color: #fff; border: none; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 20px; }
    .btn:hover { background: #1055a0; }
    .btn:disabled { background: #9ab8d8; cursor: not-allowed; }
    .step-count { font-size: 12px; color: #9a9a9a; text-align: center; margin-bottom: 22px; }
    .preview-bar { background: #b5212b; color: #fff; text-align: center; padding: 9px; font-size: 12px; font-weight: 700; letter-spacing: 1px; }

    .diagram { background: #f4f6f9; border: 1px solid #e0e0e0; padding: 20px 16px 14px; margin: 18px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .diagram svg { display: block; }
    .diagram-caption { font-size: 12px; font-weight: 700; color: #6b6b6b; text-align: center; letter-spacing: 0.5px; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="preview-bar">PREVIEW — rentwithtvr.com/safety</div>
<div class="topbar">
  <div class="topbar-logo">Tennessee Valley Rentals LLC</div>
  <div class="topbar-sub">Trailer Safety · ~5 min</div>
</div>

<div class="shell" id="app"></div>

<script>
var step = 0;
var ans = {};
var submitted = false;
var STEPS = ["Pre-Trip", "Loading", "Driving", "Hills & Backup", "Quiz", "Done"];
var QUIZ = [
  { q: "Safety chains should always be:", opts: ["Run straight across, parallel", "Crossed in an X under the tongue", "Attached to the ball mount"], a: 1 },
  { q: "What percentage of load goes in front of the axle?", opts: ["40%", "50%", "60%"], a: 2 },
  { q: "The recommended max towing speed is:", opts: ["65 MPH", "55 MPH", "45 MPH"], a: 1 },
  { q: "If your trailer starts to sway, you should:", opts: ["Brake hard immediately", "Speed up to stabilize", "Ease off the gas and hold steady"], a: 2 },
  { q: "When backing up, turn the wheel:", opts: ["Same direction as the trailer", "Opposite the direction you want the trailer to go", "It doesn't matter — just go slow"], a: 1 },
];

function dots() {
  var h = '<div class="dots">';
  STEPS.forEach(function(s, i) {
    var cls = i < step ? "done" : i === step ? "active" : "";
    h += '<div class="dot ' + cls + '">' + (i < step ? "✓" : (i+1)) + '</div>';
    if (i < STEPS.length - 1) h += '<div class="dot-line ' + (i < step ? "done" : "") + '"></div>';
  });
  return h + '</div>';
}

function render() {
  var fns = [pretrip, loading, driving, onroad, quizStep, doneStep];
  document.getElementById("app").innerHTML = dots() +
    '<div class="step-count">' + STEPS[step] + ' · Step ' + (step+1) + ' of ' + STEPS.length + '</div>' +
    fns[step]();
  window.scrollTo(0, 0);
}

function next()  { step++; render(); }
function pick(qi, oi) { if (submitted) return; ans[qi] = oi; render(); }
function submitQ() { submitted = true; render(); }
function retry() { ans = {}; submitted = false; render(); }

/* ── Hitch diagram ── */
function hitchAnim() {
  return '<div class="diagram">' +
    '<svg width="300" height="150" viewBox="0 0 300 150">' +
      /* Vehicle */
      '<rect x="8" y="30" width="90" height="64" rx="6" fill="#1568be"/>' +
      '<rect x="16" y="40" width="74" height="30" rx="3" fill="#a8c8f0" opacity="0.6"/>' +
      '<text x="53" y="106" text-anchor="middle" font-size="9" fill="#1568be" font-weight="700">TOW VEHICLE</text>' +
      /* Ball mount */
      '<rect x="90" y="57" width="32" height="8" rx="2" fill="#555"/>' +
      /* Ball */
      '<circle cx="130" cy="58" r="10" fill="#888"/>' +
      '<circle cx="130" cy="58" r="4" fill="#bbb"/>' +
      '<text x="130" y="80" text-anchor="middle" font-size="8" fill="#555" font-weight="700">2 5/16" BALL</text>' +
      /* Coupler locked */
      '<rect x="119" y="30" width="22" height="20" rx="3" fill="#444"/>' +
      '<rect x="116" y="46" width="28" height="10" rx="2" fill="#333"/>' +
      /* Lock pin */
      '<line x1="140" y1="36" x2="148" y2="36" stroke="#22a355" stroke-width="3" stroke-linecap="round"/>' +
      '<text x="152" y="25" font-size="9" fill="#22a355" font-weight="700">LOCKED ✓</text>' +
      /* Tongue */
      '<line x1="130" y1="50" x2="210" y2="50" stroke="#444" stroke-width="7" stroke-linecap="round"/>' +
      /* Trailer */
      '<rect x="172" y="20" width="110" height="72" rx="4" fill="#262626"/>' +
      '<rect x="180" y="28" width="94" height="56" rx="2" fill="#3a3a3a"/>' +
      '<circle cx="190" cy="100" r="11" fill="#333"/><circle cx="190" cy="100" r="5" fill="#666"/>' +
      '<circle cx="265" cy="100" r="11" fill="#333"/><circle cx="265" cy="100" r="5" fill="#666"/>' +
      '<text x="227" y="106" text-anchor="middle" font-size="9" fill="#555" font-weight="700">TRAILER</text>' +
      /* Safety pin arrow */
      '<line x1="140" y1="45" x2="155" y2="45" stroke="#b5212b" stroke-width="1.5" stroke-dasharray="3,2"/>' +
      '<text x="156" y="48" font-size="8" fill="#b5212b" font-weight="700">← SAFETY PIN</text>' +
    '</svg>' +
    '<div class="diagram-caption">Seat the coupler fully — lock the latch and insert the safety pin</div>' +
  '</div>';
}

/* ── Safety chains diagram ── */
function chainsAnim() {
  return '<div class="diagram">' +
    '<svg width="300" height="130" viewBox="0 0 300 130">' +
      /* Labels top */
      '<text x="150" y="14" text-anchor="middle" font-size="10" fill="#555" font-weight="700">TOP-DOWN VIEW</text>' +
      /* Vehicle */
      '<rect x="10" y="25" width="70" height="80" rx="5" fill="#1568be"/>' +
      '<text x="45" y="70" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">VEHICLE</text>' +
      /* Tongue */
      '<rect x="78" y="58" width="60" height="9" rx="2" fill="#555"/>' +
      /* Coupler */
      '<rect x="80" y="52" width="20" height="22" rx="3" fill="#333"/>' +
      /* Trailer */
      '<rect x="140" y="30" width="140" height="70" rx="4" fill="#262626"/>' +
      '<text x="210" y="70" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">TRAILER</text>' +
      /* Hook points on vehicle frame */
      '<circle cx="78" cy="30" r="5" fill="#b5212b"/>' +
      '<circle cx="78" cy="100" r="5" fill="#b5212b"/>' +
      /* Hook points on trailer tongue */
      '<circle cx="140" cy="38" r="5" fill="#b5212b"/>' +
      '<circle cx="140" cy="92" r="5" fill="#b5212b"/>' +
      /* Chain 1: top-left to bottom-right (crosses) */
      '<path d="M78,34 Q108,65 140,88" fill="none" stroke="#b5212b" stroke-width="3" stroke-linecap="round"/>' +
      /* Chain 2: bottom-left to top-right (crosses) */
      '<path d="M78,96 Q108,65 140,42" fill="none" stroke="#b5212b" stroke-width="3" stroke-linecap="round"/>' +
      /* X marker in center */
      '<text x="108" y="70" text-anchor="middle" font-size="20" fill="#b5212b" font-weight="900" opacity="0.35">✕</text>' +
      /* Labels */
      '<text x="60" y="20" text-anchor="middle" font-size="8" fill="#b5212b" font-weight="700">Hook A</text>' +
      '<text x="60" y="118" text-anchor="middle" font-size="8" fill="#b5212b" font-weight="700">Hook B</text>' +
      '<text x="152" y="22" font-size="8" fill="#b5212b" font-weight="700">Hook C</text>' +
      '<text x="152" y="104" font-size="8" fill="#b5212b" font-weight="700">Hook D</text>' +
      '<text x="108" y="118" text-anchor="middle" font-size="8" fill="#555">A → D  ·  B → C  (cross under tongue)</text>' +
    '</svg>' +
    '<div class="diagram-caption">Chains cross in an X under the tongue — hooks face down</div>' +
  '</div>';
}

/* ── Load distribution diagram ── */
function loadAnim() {
  return '<div class="diagram">' +
    '<svg width="300" height="120" viewBox="0 0 300 120">' +
      /* Trailer outline */
      '<rect x="20" y="20" width="260" height="65" rx="4" fill="#fff" stroke="#d0d0d0" stroke-width="2"/>' +
      /* Front zone 60% */
      '<rect x="20" y="20" width="156" height="65" rx="4" fill="#1568be" opacity="0.12"/>' +
      /* Rear zone 40% */
      '<rect x="176" y="20" width="104" height="65" rx="4" fill="#e8e8e8" opacity="0.7"/>' +
      /* Axle line */
      '<rect x="174" y="12" width="4" height="80" fill="#b5212b"/>' +
      '<text x="176" y="10" text-anchor="middle" font-size="8" fill="#b5212b" font-weight="700">AXLE</text>' +
      /* HEAVY boxes in front */
      '<rect x="32" y="28" width="50" height="42" rx="3" fill="#1568be"/>' +
      '<text x="57" y="48" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">HEAVY</text>' +
      '<text x="57" y="60" text-anchor="middle" font-size="8" fill="#e0ecff">items</text>' +
      '<rect x="92" y="32" width="44" height="34" rx="3" fill="#1568be" opacity="0.8"/>' +
      '<text x="114" y="52" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">HEAVY</text>' +
      /* LIGHT box in rear */
      '<rect x="192" y="36" width="56" height="26" rx="3" fill="#9a9a9a"/>' +
      '<text x="220" y="52" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">light</text>' +
      /* Zone labels */
      '<text x="98" y="100" text-anchor="middle" font-size="11" fill="#1568be" font-weight="700">← 60%  FRONT</text>' +
      '<text x="228" y="100" text-anchor="middle" font-size="11" fill="#9a9a9a" font-weight="700">REAR  40% →</text>' +
      /* Wheels */
      '<circle cx="176" cy="99" r="10" fill="#333"/><circle cx="176" cy="99" r="4" fill="#666"/>' +
    '</svg>' +
    '<div class="diagram-caption">60% of total load goes in front of the axle — heavy items toward the front</div>' +
  '</div>';
}

/* ── Sway warning diagram ── */
function swayAnim() {
  return '<div class="diagram">' +
    '<svg width="300" height="120" viewBox="0 0 300 120">' +
      /* Road */
      '<rect x="0" y="70" width="300" height="50" fill="#ddd"/>' +
      '<line x1="0" y1="95" x2="300" y2="95" stroke="#fff" stroke-width="2" stroke-dasharray="18,12"/>' +
      /* Vehicle — centered, straight */
      '<rect x="20" y="35" width="68" height="40" rx="5" fill="#1568be"/>' +
      '<rect x="28" y="43" width="52" height="20" rx="2" fill="#a8c8f0" opacity="0.6"/>' +
      '<circle cx="32" cy="75" r="9" fill="#333"/><circle cx="32" cy="75" r="4" fill="#666"/>' +
      '<circle cx="76" cy="75" r="9" fill="#333"/><circle cx="76" cy="75" r="4" fill="#666"/>' +
      /* Hitch bar */
      '<line x1="88" y1="55" x2="118" y2="55" stroke="#444" stroke-width="5"/>' +
      /* Trailer swaying right — angled */
      '<g transform="translate(116,32) rotate(10,10,22)">' +
        '<rect x="0" y="0" width="100" height="55" rx="4" fill="#262626"/>' +
        '<rect x="6" y="6" width="88" height="42" rx="2" fill="#3a3a3a"/>' +
        '<circle cx="25" cy="60" r="9" fill="#333"/><circle cx="25" cy="60" r="4" fill="#666"/>' +
        '<circle cx="75" cy="60" r="9" fill="#333"/><circle cx="75" cy="60" r="4" fill="#666"/>' +
      '</g>' +
      /* Warning badge */
      '<rect x="0" y="0" width="300" height="28" fill="#b5212b" opacity="0.08"/>' +
      '<text x="150" y="18" text-anchor="middle" font-size="11" fill="#b5212b" font-weight="700">⚠  TOO MUCH REAR WEIGHT CAUSES SWAY</text>' +
    '</svg>' +
    '<div class="diagram-caption">If sway starts — ease off the gas, hold steady, do NOT brake hard</div>' +
  '</div>';
}

/* ── Speed limit diagram ── */
function speedAnim() {
  return '<div class="diagram">' +
    '<svg width="300" height="110" viewBox="0 0 300 110">' +
      /* Speedometer */
      '<path d="M55,95 A60,60 0 0,1 175,95" fill="none" stroke="#e0e0e0" stroke-width="16" stroke-linecap="round"/>' +
      '<path d="M55,95 A60,60 0 0,1 131,37" fill="none" stroke="#22a355" stroke-width="16" stroke-linecap="round"/>' +
      '<path d="M131,37 A60,60 0 0,1 175,95" fill="none" stroke="#b5212b" stroke-width="16" stroke-linecap="round" opacity="0.3"/>' +
      /* Needle at 55 */
      '<line x1="115" y1="95" x2="115" y2="45" stroke="#1568be" stroke-width="3" stroke-linecap="round" transform="rotate(-8 115 95)"/>' +
      '<circle cx="115" cy="95" r="7" fill="#333"/>' +
      /* Speed labels */
      '<text x="48" y="110" font-size="9" fill="#6b6b6b">0</text>' +
      '<text x="109" y="110" font-size="10" fill="#333" font-weight="700">55</text>' +
      '<text x="168" y="110" font-size="9" fill="#6b6b6b">80</text>' +
      '<text x="115" y="80" text-anchor="middle" font-size="8" fill="#6b6b6b">MPH</text>' +
      /* MAX label */
      '<text x="148" y="58" font-size="9" fill="#b5212b" font-weight="700">MAX →</text>' +
      /* Right panel — rule */
      '<rect x="196" y="15" width="96" height="80" rx="6" fill="#b5212b"/>' +
      '<text x="244" y="44" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">MAX</text>' +
      '<text x="244" y="62" text-anchor="middle" font-size="26" fill="#fff" font-weight="900">55</text>' +
      '<text x="244" y="80" text-anchor="middle" font-size="11" fill="#ffcdd0">MPH</text>' +
      '<text x="244" y="103" text-anchor="middle" font-size="8" fill="#555" font-weight="700">WHEN TOWING</text>' +
    '</svg>' +
    '<div class="diagram-caption">Stay at or below 55 MPH — trailers need more distance to stop</div>' +
  '</div>';
}

/* ── Backing up diagram ── */
function backupAnim() {
  return '<div class="diagram">' +
    '<svg width="300" height="140" viewBox="0 0 300 140">' +
      /* Label */
      '<text x="150" y="14" text-anchor="middle" font-size="10" fill="#555" font-weight="700">OVERHEAD VIEW</text>' +
      /* Road */
      '<rect x="0" y="20" width="300" height="120" fill="#ddd"/>' +
      '<line x1="150" y1="20" x2="150" y2="140" stroke="#fff" stroke-width="2" stroke-dasharray="12,10"/>' +
      /* Trailer (in front, going to right) */
      '<rect x="160" y="32" width="120" height="50" rx="4" fill="#262626"/>' +
      '<rect x="166" y="37" width="108" height="40" rx="2" fill="#3a3a3a"/>' +
      '<circle cx="175" cy="85" r="8" fill="#444"/>' +
      '<circle cx="272" cy="85" r="8" fill="#444"/>' +
      /* Tongue angled */
      '<line x1="160" y1="57" x2="120" y2="68" stroke="#444" stroke-width="6" stroke-linecap="round"/>' +
      /* Vehicle (behind, reversed) */
      '<rect x="22" y="55" width="100" height="52" rx="5" fill="#1568be"/>' +
      '<rect x="30" y="62" width="84" height="30" rx="2" fill="#a8c8f0" opacity="0.6"/>' +
      '<circle cx="35" cy="110" r="9" fill="#333"/><circle cx="35" cy="110" r="4" fill="#666"/>' +
      '<circle cx="112" cy="110" r="9" fill="#333"/><circle cx="112" cy="110" r="4" fill="#666"/>' +
      /* Reverse arrow */
      '<text x="72" y="130" text-anchor="middle" font-size="20" fill="#fff" font-weight="900">▲</text>' +
      /* Steering wheel direction */
      '<rect x="24" y="24" width="96" height="24" rx="3" fill="#fff" stroke="#1568be" stroke-width="1.5"/>' +
      '<text x="72" y="40" text-anchor="middle" font-size="10" fill="#1568be" font-weight="700">← Turn wheel LEFT</text>' +
      /* Result arrow */
      '<path d="M222,30 Q240,20 255,32" fill="none" stroke="#22a355" stroke-width="2.5" stroke-linecap="round"/>' +
      '<polygon points="252,28 258,35 261,27" fill="#22a355"/>' +
      '<text x="222" y="24" font-size="9" fill="#22a355" font-weight="700">Trailer goes RIGHT</text>' +
    '</svg>' +
    '<div class="diagram-caption">Wheel LEFT = trailer goes RIGHT. Opposite always — go slow and use both mirrors</div>' +
  '</div>';
}

function pretrip() {
  return '<div class="card">' +
    '<div class="kicker">Step 1 · Pre-Trip Checklist</div>' +
    '<h2>Check before you leave.</h2>' +
    hitchAnim() +
    '<ul class="cl">' +
      '<li><div class="ci">1</div><div><strong>Know your towing capacity</strong><span>Check your owner\'s manual. Never exceed your vehicle\'s rated limit — it damages your engine and increases accident risk.</span></div></li>' +
      '<li><div class="ci">2</div><div><strong>Ball size: 2 5/16" — verify before coupling</strong><span>Wrong size means the trailer can detach at speed. Seat the coupler fully, lock the latch, insert the safety pin.</span></div></li>' +
      '<li><div class="ci">3</div><div><strong>Cross the safety chains in an X under the tongue</strong><span>Creates a cradle if the hitch fails. Hooks face down. Slack but not dragging.</span></div></li>' +
      '<li><div class="ci">4</div><div><strong>Test lights and electric brakes</strong><span>Have someone stand behind. Check running lights, brake lights, and turn signals before moving.</span></div></li>' +
      '<li><div class="ci">5</div><div><strong>Check tire pressure — trailer and tow vehicle</strong><span>Under-inflated tires run hot and can blow out under load.</span></div></li>' +
      '<li><div class="ci">6</div><div><strong>Attach the breakaway cable</strong><span>To your vehicle frame — not the ball mount. Activates trailer brakes if you separate.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>Before pulling away</b>Drive 5 feet, stop, get out, and check everything is still tight.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function loading() {
  return '<div class="card">' +
    '<div class="kicker">Step 2 · Loading</div>' +
    '<h2>Weight placement matters.</h2>' +
    loadAnim() +
    chainsAnim() +
    '<ul class="cl">' +
      '<li><div class="ci">✓</div><div><strong>60% of load in front of the axle</strong><span>Keeps tongue weight firm and your tow vehicle stable.</span></div></li>' +
      '<li><div class="ci">✓</div><div><strong>Spread weight evenly side to side</strong><span>A trailer heavy on one side pulls and handles poorly.</span></div></li>' +
      '<li><div class="ci">✓</div><div><strong>Keep heavy items low and strapped</strong><span>Low center of gravity = more stable. Shifting load changes balance mid-trip.</span></div></li>' +
      '<li><div class="ci">✗</div><div><strong>Never load heavy items in the rear</strong><span>Too much rear weight causes trailer sway — dangerous fishtailing at highway speeds.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>Tongue weight target</b>10–15% of total loaded trailer weight. For 2,000 lbs loaded: 200–300 lbs on the tongue.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function driving() {
  return '<div class="card">' +
    '<div class="kicker">Step 3 · Driving</div>' +
    '<h2>Everything takes longer with a trailer.</h2>' +
    speedAnim() +
    swayAnim() +
    '<ul class="cl">' +
      '<li><div class="ci">1</div><div><strong>Max speed: 55 MPH</strong><span>Trailers add weight and length — longer stopping distance, slower acceleration, less room for error.</span></div></li>' +
      '<li><div class="ci">2</div><div><strong>5-second following distance minimum</strong><span>Braking takes significantly longer. Double your normal gap.</span></div></li>' +
      '<li><div class="ci">3</div><div><strong>Swing wide on turns</strong><span>Trailers track inside your wheels. On right turns, swing wide or the trailer clips the curb.</span></div></li>' +
      '<li><div class="ci">4</div><div><strong>Check mirrors constantly</strong><span>Adjust before you leave. Signal early, move slowly on lane changes.</span></div></li>' +
      '<li><div class="ci">5</div><div><strong>No cruise control</strong><span>Can\'t react fast enough to hills or sudden traffic. Stay in manual control.</span></div></li>' +
    '</ul>' +
    '<div class="warn"><b>If sway starts</b>Do NOT brake hard. Ease off the gas, hold steady, let speed drop naturally. Pull over and recheck your load.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function onroad() {
  return '<div class="card">' +
    '<div class="kicker">Step 4 · Hills & Backing Up</div>' +
    '<h2>Two situations that catch people off guard.</h2>' +
    backupAnim() +
    '<ul class="cl">' +
      '<li><div class="ci">1</div><div><strong>Going uphill — use a lower gear</strong><span>More power without overworking the engine.</span></div></li>' +
      '<li><div class="ci">2</div><div><strong>Going downhill — engine brake, don\'t ride the brakes</strong><span>Shift down and let the engine slow you. Riding brakes overheats them and kills stopping power.</span></div></li>' +
      '<li><div class="ci">3</div><div><strong>Backing up — turn wheel opposite of where you want the trailer</strong><span>Go slow. Small corrections. Use both mirrors. A spotter helps.</span></div></li>' +
      '<li><div class="ci">4</div><div><strong>Check at every fuel stop</strong><span>Hitch tight? Chains in place? Tires okay? Lights working? 60 seconds every stop.</span></div></li>' +
      '<li><div class="ci">5</div><div><strong>Carry a trailer spare tire</strong><span>Trailer tires aren\'t always the same as your vehicle — a flat can leave you stranded.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>Always buckle up</b>Towing increases the forces involved in any collision.</div>' +
    '<button class="btn" onclick="next()">Take the Quiz →</button>' +
  '</div>';
}

function quizStep() {
  var allDone = Object.keys(ans).length === QUIZ.length;
  var correct = QUIZ.filter(function(q, i) { return ans[i] === q.a; }).length;
  var html = '<div class="card"><div class="kicker">Quiz · 5 Questions</div><h2>Quick check.</h2>';
  QUIZ.forEach(function(q, qi) {
    html += '<div class="q-wrap"><div class="q-label">' + (qi+1) + '. ' + q.q + '</div>';
    q.opts.forEach(function(o, oi) {
      var cls = "opt";
      if (ans[qi] === oi) { cls += submitted ? (oi === q.a ? " correct" : " wrong") : " sel"; }
      else if (submitted && oi === q.a) cls += " correct";
      html += '<div class="' + cls + '" onclick="pick(' + qi + ',' + oi + ')"><div class="radio"></div>' + o + '</div>';
    });
    html += '</div>';
  });
  if (!submitted) {
    html += '<button class="btn" ' + (allDone ? '' : 'disabled') + ' onclick="submitQ()">Submit Answers</button>';
  } else if (correct === QUIZ.length) {
    html += '<div class="tip" style="margin-top:14px;"><b>Perfect — 5/5 ✓</b>You\'re ready to tow safely. Claim your discount.</div>';
    html += '<button class="btn" onclick="next()">Claim $5 off →</button>';
  } else {
    html += '<div class="warn" style="margin-top:14px;"><b>' + correct + '/5 correct</b>Review the highlighted answers and try again.</div>';
    html += '<button class="btn" onclick="retry()">Try Again</button>';
  }
  return html + '</div>';
}

function doneStep() {
  return '<div class="coupon">' +
    '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#6b6b6b;margin-bottom:8px;">Safety certified — here\'s your reward</div>' +
    '<div style="font-size:20px;font-weight:700;color:#262626;">$5 off your rental</div>' +
    '<div class="coupon-code">SAFE5</div>' +
    '<div style="font-size:13px;color:#6b6b6b;">Enter at checkout. One use per customer.</div>' +
  '</div>' +
  '<div class="card" style="text-align:center;padding:28px;">' +
    '<div style="font-size:14px;color:#6b6b6b;margin-bottom:4px;">Ready to book?</div>' +
    '<button class="btn" style="max-width:260px;margin:14px auto 0;" onclick="alert(\'Goes to booking page\')">Reserve a Trailer →</button>' +
  '</div>';
}

render();
</script>
</body>
</html>
