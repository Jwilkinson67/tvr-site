<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TVR Trailer Safety Course — Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: "Inter", Arial, sans-serif; background: #f6f7f9; color: #262626; font-size: 15px; }
    .topbar { background: #1568be; color: #fff; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-weight: 700; font-size: 17px; }
    .topbar-sub { font-size: 12px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; }
    .shell { max-width: 680px; margin: 40px auto; padding: 0 24px 80px; }

    /* Progress dots */
    .dots { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 40px; }
    .dot-wrap { display: flex; align-items: center; }
    .dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #d0d0d0; background: #fff; color: #9a9a9a; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .dot.active { border-color: #1568be; background: #1568be; color: #fff; }
    .dot.done { border-color: #1568be; background: #1568be; color: #fff; font-size: 14px; }
    .dot-line { width: 36px; height: 2px; background: #d0d0d0; }
    .dot-line.done { background: #1568be; }

    /* Card */
    .card { background: #fff; border: 1px solid #e0e0e0; padding: 36px; margin-bottom: 20px; }
    .kicker { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #1568be; margin-bottom: 10px; }
    h2 { font-size: 24px; font-weight: 700; margin: 0 0 24px; line-height: 1.2; color: #262626; }

    /* Checklist */
    .checklist { list-style: none; padding: 0; margin: 0; }
    .checklist li { display: flex; gap: 14px; padding: 13px 0; border-bottom: 1px solid #f0f0f0; line-height: 1.5; }
    .checklist li:last-child { border-bottom: none; }
    .check-icon { width: 22px; height: 22px; border-radius: 50%; background: #1568be; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .checklist strong { font-size: 14px; color: #262626; }
    .checklist span { font-size: 13px; color: #6b6b6b; display: block; margin-top: 2px; }

    /* Tip / warning */
    .tip { background: #eef5ff; border-left: 3px solid #1568be; padding: 14px 18px; margin: 20px 0; font-size: 13px; color: #0b3d7a; line-height: 1.6; }
    .warn { background: #fff8e0; border-left: 3px solid #b88017; padding: 14px 18px; margin: 20px 0; font-size: 13px; color: #7a5500; line-height: 1.6; }
    .tip b, .warn b { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }

    /* Load diagram */
    .diagram { background: #f4f6f9; border: 1px solid #e0e0e0; padding: 20px; margin: 20px 0; text-align: center; }
    .trailer-bar { display: flex; height: 44px; max-width: 400px; margin: 12px auto; border: 2px solid #262626; overflow: hidden; position: relative; }
    .t-front { background: #1568be; color: #fff; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; width: 60%; }
    .t-rear  { background: #e0e0e0; color: #6b6b6b; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; width: 40%; }
    .axle { position: absolute; left: 60%; top: -4px; bottom: -4px; width: 3px; background: #b5212b; }
    .diagram-note { font-size: 12px; color: #6b6b6b; margin-top: 8px; }

    /* Quiz */
    .q-label { font-weight: 700; font-size: 15px; color: #262626; margin-bottom: 12px; }
    .q-wrap { margin-bottom: 24px; }
    .opt { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 2px solid #e0e0e0; margin-bottom: 8px; cursor: pointer; font-size: 14px; transition: border-color 0.15s, background 0.15s; }
    .opt:hover { border-color: #1568be; background: #f0f6ff; }
    .opt.sel { border-color: #1568be; background: #f0f6ff; }
    .opt.correct { border-color: #22a355; background: #edfaf1; color: #155a30; font-weight: 600; }
    .opt.wrong   { border-color: #b5212b; background: #fdf0f0; color: #7a1018; }
    .radio { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #d0d0d0; flex-shrink: 0; }
    .opt.sel .radio { border-color: #1568be; background: #1568be; }

    /* Coupon */
    .coupon { background: #fff; border: 2px dashed #1568be; padding: 40px 32px; text-align: center; margin-bottom: 20px; }
    .coupon-code { display: inline-block; background: #1568be; color: #fff; font-weight: 700; font-size: 26px; letter-spacing: 5px; padding: 14px 40px; margin: 16px 0; }
    .coupon-sub { font-size: 13px; color: #6b6b6b; }

    /* Button */
    .btn { display: block; width: 100%; padding: 14px; background: #1568be; color: #fff; border: none; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 24px; letter-spacing: 0.3px; }
    .btn:hover { background: #1055a0; }
    .btn:disabled { background: #9ab8d8; cursor: not-allowed; }
    .btn-outline { background: #fff; color: #1568be; border: 2px solid #1568be; }

    .preview-bar { background: #b5212b; color: #fff; text-align: center; padding: 9px; font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    .step-count { font-size: 12px; color: #9a9a9a; margin-bottom: 28px; text-align: center; }
  </style>
</head>
<body>

<div class="preview-bar">PREVIEW — rentwithtvr.com/safety</div>
<div class="topbar">
  <div class="topbar-logo">Tennessee Valley Rentals LLC</div>
  <div class="topbar-sub">Trailer Safety · 4 min</div>
</div>

<div class="shell" id="app"></div>

<script>
var step = 0;
var ans = {};
var submitted = false;

var STEPS = ["Hitch", "Chains", "Loading", "Driving", "Quiz", "Done"];

var QUIZ = [
  { q: "Safety chains should be routed:", opts: ["Straight across, parallel", "Crossed in an X under the tongue", "Over the top of the coupler"], a: 1 },
  { q: "Where should 60% of your load sit?", opts: ["Behind the axle", "Evenly on both sides", "In front of the axle"], a: 2 },
  { q: "Too much weight on the rear of the trailer causes:", opts: ["Tongue overload", "Trailer sway", "Better fuel economy"], a: 1 },
  { q: "When stopping with a trailer, you should:", opts: ["Brake the same as normal", "Begin braking much earlier than usual", "Pump the brakes rapidly"], a: 1 },
];

function dots() {
  var h = '<div class="dots">';
  STEPS.forEach(function(s, i) {
    var cls = i < step ? "done" : i === step ? "active" : "";
    h += '<div class="dot-wrap"><div class="dot ' + cls + '">' + (i < step ? "✓" : (i+1)) + '</div></div>';
    if (i < STEPS.length - 1) h += '<div class="dot-line ' + (i < step ? "done" : "") + '"></div>';
  });
  return h + '</div>';
}

function render() {
  var html = dots() + '<div class="step-count">' + STEPS[step] + ' · Step ' + (step+1) + ' of ' + STEPS.length + '</div>';
  if (step === 0) html += hitchHTML();
  if (step === 1) html += chainsHTML();
  if (step === 2) html += loadHTML();
  if (step === 3) html += drivingHTML();
  if (step === 4) html += quizHTML();
  if (step === 5) html += doneHTML();
  document.getElementById("app").innerHTML = html;
  window.scrollTo(0, 0);
}

function next() { step++; render(); }
function pick(qi, oi) { if (submitted) return; ans[qi] = oi; render(); }
function submit() { submitted = true; render(); }
function retry() { ans = {}; submitted = false; render(); }

function hitchHTML() {
  return '<div class="card">' +
    '<div class="kicker">Step 1 · Hitch Setup</div>' +
    '<h2>Connect it right.</h2>' +
    '<ul class="checklist">' +
      '<li><div class="check-icon">1</div><div><strong>Ball size: 2 5/16"</strong><span>Verify before coupling. Wrong size = trailer can detach at speed.</span></div></li>' +
      '<li><div class="check-icon">2</div><div><strong>Seat the coupler fully</strong><span>Lower onto the ball until it clicks and locks. Tug up — it should not lift.</span></div></li>' +
      '<li><div class="check-icon">3</div><div><strong>Insert the safety pin</strong><span>Through the coupler latch. This is your first backup if the ball fails.</span></div></li>' +
      '<li><div class="check-icon">4</div><div><strong>Connect the 7-way plug</strong><span>Lights and electric brakes. Test both before leaving.</span></div></li>' +
      '<li><div class="check-icon">5</div><div><strong>Clip the breakaway cable</strong><span>To a solid point on your vehicle — not the ball mount. Activates trailer brakes if you separate.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>Before you pull away</b>Drive 5 feet, stop, get out, and check everything is still tight.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function chainsHTML() {
  return '<div class="card">' +
    '<div class="kicker">Step 2 · Safety Chains</div>' +
    '<h2>Cross them. Every time.</h2>' +
    '<ul class="checklist">' +
      '<li><div class="check-icon">1</div><div><strong>Always cross in an X under the tongue</strong><span>Left chain to right hook, right chain to left hook. Creates a cradle that catches the tongue if the hitch fails.</span></div></li>' +
      '<li><div class="check-icon">2</div><div><strong>Slack — but not dragging</strong><span>Enough to turn without binding. Dragging chains wear through and spark.</span></div></li>' +
      '<li><div class="check-icon">3</div><div><strong>Hooks face down</strong><span>So road vibration can\'t bounce them loose.</span></div></li>' +
    '</ul>' +
    '<div class="warn"><b>Non-negotiable</b>An uncrossed or unattached chain means a detached trailer can cross into oncoming traffic. 30 seconds. Do it.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function loadHTML() {
  return '<div class="card">' +
    '<div class="kicker">Step 3 · Loading</div>' +
    '<h2>Weight placement is everything.</h2>' +
    '<div class="diagram">' +
      '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">Correct load distribution</div>' +
      '<div class="trailer-bar"><div class="t-front">60% front</div><div class="axle"></div><div class="t-rear">40% rear</div></div>' +
      '<div class="diagram-note">Red line = axle &nbsp;|&nbsp; Heavy items go in the blue zone</div>' +
    '</div>' +
    '<ul class="checklist">' +
      '<li><div class="check-icon">✓</div><div><strong>60% of load in front of the axle</strong><span>Keeps tongue weight firm, tow vehicle stable.</span></div></li>' +
      '<li><div class="check-icon">✓</div><div><strong>Too much rear weight = trailer sway</strong><span>The trailer fishtails. If it happens: do not brake hard. Ease off the gas and let speed drop naturally.</span></div></li>' +
      '<li><div class="check-icon">✓</div><div><strong>Keep it low and strapped</strong><span>Low center of gravity = more stable. Everything must be secured before moving.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>Tongue weight target</b>10–15% of total loaded trailer weight. For a 2,000 lb load, that\'s 200–300 lbs on the tongue.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function drivingHTML() {
  return '<div class="card">' +
    '<div class="kicker">Step 4 · Driving</div>' +
    '<h2>Towing changes everything.</h2>' +
    '<ul class="checklist">' +
      '<li><div class="check-icon">1</div><div><strong>Start braking much earlier</strong><span>A loaded trailer adds significant stopping distance. Double the following distance you\'d normally keep.</span></div></li>' +
      '<li><div class="check-icon">2</div><div><strong>Make wider turns</strong><span>The trailer tracks inside your wheels. Swing wide on right turns or the trailer will clip curbs.</span></div></li>' +
      '<li><div class="check-icon">3</div><div><strong>Check your mirrors constantly</strong><span>Especially on lane changes. Trailers have a large blind spot. Signal early, move slowly.</span></div></li>' +
      '<li><div class="check-icon">4</div><div><strong>Reduce speed on curves and ramps</strong><span>A trailer raises your center of gravity. What feels fine in a car can tip a loaded trailer.</span></div></li>' +
      '<li><div class="check-icon">5</div><div><strong>No sudden moves</strong><span>Jerking the wheel or braking hard can cause sway. Smooth inputs only.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>If trailer sway starts</b>Do NOT brake. Ease off the gas. Hold the wheel straight. Let the trailer settle on its own.</div>' +
    '<button class="btn" onclick="next()">Take the Quiz →</button>' +
  '</div>';
}

function quizHTML() {
  var allDone = Object.keys(ans).length === QUIZ.length;
  var correct = QUIZ.filter(function(q, i) { return ans[i] === q.a; }).length;
  var html = '<div class="card"><div class="kicker">Quiz · 4 Questions</div><h2>Quick check.</h2>';
  QUIZ.forEach(function(q, qi) {
    html += '<div class="q-wrap"><div class="q-label">' + (qi+1) + '. ' + q.q + '</div>';
    q.opts.forEach(function(o, oi) {
      var cls = "opt";
      if (ans[qi] === oi) { cls += submitted ? (oi === q.a ? " correct" : " wrong") : " sel"; }
      else if (submitted && oi === q.a) cls += " correct";
      html += '<div class="' + cls + '" onclick="pick(' + qi + ',' + oi + ')"><div class="radio"></div>' + o + '</div>';
    });
    html += '</div>';
  });
  if (!submitted) {
    html += '<button class="btn" ' + (allDone ? '' : 'disabled') + ' onclick="submit()">Submit</button>';
  } else if (correct === QUIZ.length) {
    html += '<div class="tip" style="margin-top:16px;"><b>Perfect — ' + correct + '/4 ✓</b>You\'re ready to tow. Claim your discount below.</div>';
    html += '<button class="btn" onclick="next()">Claim $5 off →</button>';
  } else {
    html += '<div class="warn" style="margin-top:16px;"><b>' + correct + '/4 correct</b>Review the answers above and try again.</div>';
    html += '<button class="btn" onclick="retry()">Try Again</button>';
  }
  return html + '</div>';
}

function doneHTML() {
  return '<div class="coupon">' +
    '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#6b6b6b;margin-bottom:8px;">You passed — here\'s your reward</div>' +
    '<div style="font-size:20px;font-weight:700;color:#262626;">$5 off your rental</div>' +
    '<div class="coupon-code">SAFE5</div>' +
    '<div class="coupon-sub">Enter at checkout. One use per customer.</div>' +
  '</div>' +
  '<div class="card" style="text-align:center;">' +
    '<div style="font-size:14px;color:#6b6b6b;margin-bottom:4px;">Ready to book?</div>' +
    '<button class="btn" style="max-width:280px;margin:16px auto 0;" onclick="alert(\'Goes to booking page\')">Reserve a Trailer →</button>' +
  '</div>';
}

render();
</script>
</body>
</html>
