<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TVR Trailer Safety Course — Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: "Inter", Arial, sans-serif; background: #f6f7f9; color: #262626; font-size: 15px; }
    .topbar { background: #1568be; color: #fff; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-weight: 700; font-size: 17px; }
    .topbar-sub { font-size: 12px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; }
    .shell { max-width: 680px; margin: 40px auto; padding: 0 24px 80px; }

    .dots { display: flex; align-items: center; justify-content: center; margin-bottom: 36px; }
    .dot-wrap { display: flex; align-items: center; }
    .dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #d0d0d0; background: #fff; color: #9a9a9a; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; }
    .dot.active { border-color: #1568be; background: #1568be; color: #fff; }
    .dot.done   { border-color: #1568be; background: #1568be; color: #fff; }
    .dot-line   { width: 28px; height: 2px; background: #d0d0d0; }
    .dot-line.done { background: #1568be; }

    .card { background: #fff; border: 1px solid #e0e0e0; padding: 36px; margin-bottom: 20px; }
    .kicker { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #1568be; margin-bottom: 10px; }
    h2 { font-size: 24px; font-weight: 700; margin: 0 0 22px; line-height: 1.2; color: #262626; }

    .cl { list-style: none; padding: 0; margin: 0; }
    .cl li { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .cl li:last-child { border-bottom: none; }
    .ci { width: 22px; height: 22px; border-radius: 50%; background: #1568be; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .cl strong { font-size: 14px; color: #262626; display: block; margin-bottom: 2px; }
    .cl span { font-size: 13px; color: #6b6b6b; line-height: 1.5; }

    .tip  { background: #eef5ff; border-left: 3px solid #1568be; padding: 13px 16px; margin: 18px 0; font-size: 13px; color: #0b3d7a; line-height: 1.6; }
    .warn { background: #fff8e0; border-left: 3px solid #b88017; padding: 13px 16px; margin: 18px 0; font-size: 13px; color: #7a5500; line-height: 1.6; }
    .tip b, .warn b { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }

    .diagram { background: #f4f6f9; border: 1px solid #e0e0e0; padding: 18px; margin: 18px 0; text-align: center; }
    .trailer-bar { display: flex; height: 42px; max-width: 380px; margin: 10px auto; border: 2px solid #262626; overflow: hidden; position: relative; }
    .t-front { background: #1568be; color: #fff; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; width: 60%; }
    .t-rear  { background: #e0e0e0; color: #6b6b6b; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; width: 40%; }
    .axle    { position: absolute; left: 60%; top: -4px; bottom: -4px; width: 3px; background: #b5212b; }
    .d-note  { font-size: 12px; color: #6b6b6b; margin-top: 6px; }

    .q-wrap { margin-bottom: 22px; }
    .q-label { font-weight: 700; font-size: 15px; margin-bottom: 11px; }
    .opt { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 2px solid #e0e0e0; margin-bottom: 7px; cursor: pointer; font-size: 14px; transition: border-color 0.12s, background 0.12s; }
    .opt:hover  { border-color: #1568be; background: #f0f6ff; }
    .opt.sel    { border-color: #1568be; background: #f0f6ff; }
    .opt.correct{ border-color: #22a355; background: #edfaf1; color: #155a30; font-weight: 600; }
    .opt.wrong  { border-color: #b5212b; background: #fdf0f0; color: #7a1018; }
    .radio { width: 15px; height: 15px; border-radius: 50%; border: 2px solid #d0d0d0; flex-shrink: 0; }
    .opt.sel .radio { border-color: #1568be; background: #1568be; }

    .coupon { background: #fff; border: 2px dashed #1568be; padding: 36px 32px; text-align: center; margin-bottom: 20px; }
    .coupon-code { display: inline-block; background: #1568be; color: #fff; font-weight: 700; font-size: 26px; letter-spacing: 5px; padding: 13px 36px; margin: 14px 0; }

    .btn { display: block; width: 100%; padding: 14px; background: #1568be; color: #fff; border: none; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 22px; }
    .btn:hover { background: #1055a0; }
    .btn:disabled { background: #9ab8d8; cursor: not-allowed; }

    .step-count { font-size: 12px; color: #9a9a9a; text-align: center; margin-bottom: 24px; }
    .preview-bar { background: #b5212b; color: #fff; text-align: center; padding: 9px; font-size: 12px; font-weight: 700; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="preview-bar">PREVIEW — rentwithtvr.com/safety</div>
<div class="topbar">
  <div class="topbar-logo">Tennessee Valley Rentals LLC</div>
  <div class="topbar-sub">Trailer Safety · ~5 min</div>
</div>

<div class="shell" id="app"></div>

<script>
var step = 0;
var ans = {};
var submitted = false;
var STEPS = ["Pre-Trip", "Loading", "Driving", "On the Road", "Quiz", "Done"];

var QUIZ = [
  { q: "Safety chains should always be:", opts: ["Run straight across side by side", "Crossed in an X under the tongue", "Attached to the ball mount"], a: 1 },
  { q: "What percentage of load goes in front of the axle?", opts: ["40%", "50%", "60%"], a: 2 },
  { q: "The recommended max towing speed is:", opts: ["65 MPH", "55 MPH", "45 MPH"], a: 1 },
  { q: "If your trailer starts to sway, you should:", opts: ["Brake hard immediately", "Speed up to stabilize", "Ease off the gas and hold steady"], a: 2 },
  { q: "When backing up a trailer, turn the wheel:", opts: ["The same direction you want the trailer to go", "Opposite the direction you want the trailer to go", "It doesn't matter"], a: 1 },
];

function dots() {
  var h = '<div class="dots">';
  STEPS.forEach(function(s, i) {
    var cls = i < step ? "done" : i === step ? "active" : "";
    h += '<div class="dot-wrap"><div class="dot ' + cls + '">' + (i < step ? "✓" : (i+1)) + '</div></div>';
    if (i < STEPS.length - 1) h += '<div class="dot-line ' + (i < step ? "done" : "") + '"></div>';
  });
  return h + '</div>';
}

function render() {
  var fns = [pretrip, loading, driving, onroad, quiz, done];
  document.getElementById("app").innerHTML = dots() +
    '<div class="step-count">' + STEPS[step] + ' · Step ' + (step+1) + ' of ' + STEPS.length + '</div>' +
    fns[step]();
  window.scrollTo(0, 0);
}

function next()  { step++; render(); }
function pick(qi, oi) { if (submitted) return; ans[qi] = oi; render(); }
function submitQ() { submitted = true; render(); }
function retry() { ans = {}; submitted = false; render(); }

function pretrip() {
  return '<div class="card">' +
    '<div class="kicker">Step 1 · Pre-Trip Checklist</div>' +
    '<h2>Check before you leave.</h2>' +
    '<ul class="cl">' +
      '<li><div class="ci">1</div><div><strong>Know your towing capacity</strong><span>Check your owner\'s manual. Never exceed your vehicle\'s rated tow limit — it stresses your engine and increases accident risk.</span></div></li>' +
      '<li><div class="ci">2</div><div><strong>Ball size: 2 5/16" — verify before coupling</strong><span>Wrong ball size means the trailer can detach at speed. Seat the coupler fully, lock the latch, insert the safety pin.</span></div></li>' +
      '<li><div class="ci">3</div><div><strong>Cross the safety chains in an X under the tongue</strong><span>Creates a cradle if the hitch fails. Hooks face down. Slack but not dragging.</span></div></li>' +
      '<li><div class="ci">4</div><div><strong>Test lights and brakes</strong><span>Have someone stand behind the trailer. Check running lights, brake lights, and turn signals before moving.</span></div></li>' +
      '<li><div class="ci">5</div><div><strong>Check tire pressure on both trailer and tow vehicle</strong><span>Under-inflated tires run hot and can blow out, especially under load.</span></div></li>' +
      '<li><div class="ci">6</div><div><strong>Connect the 7-way plug and breakaway cable</strong><span>Breakaway cable attaches to your vehicle frame — not the ball mount. Activates trailer brakes if you separate.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>Before pulling away</b>Drive forward 5 feet, stop, get out, and verify everything is still tight.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function loading() {
  return '<div class="card">' +
    '<div class="kicker">Step 2 · Loading</div>' +
    '<h2>Weight placement matters.</h2>' +
    '<div class="diagram">' +
      '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">Correct load distribution</div>' +
      '<div class="trailer-bar"><div class="t-front">60% — Front</div><div class="axle"></div><div class="t-rear">40% — Rear</div></div>' +
      '<div class="d-note">Red line = axle &nbsp;|&nbsp; Heavy items go in the blue zone</div>' +
    '</div>' +
    '<ul class="cl">' +
      '<li><div class="ci">✓</div><div><strong>60% of load in front of the axle</strong><span>Keeps tongue weight firm and your tow vehicle stable.</span></div></li>' +
      '<li><div class="ci">✓</div><div><strong>Spread weight evenly side to side</strong><span>A trailer heavy on one side pulls and handles poorly.</span></div></li>' +
      '<li><div class="ci">✓</div><div><strong>Keep heavy items low and centered</strong><span>Low center of gravity = more stable at speed.</span></div></li>' +
      '<li><div class="ci">✗</div><div><strong>Never load heavy items in the rear</strong><span>Too much rear weight causes trailer sway — dangerous fishtailing at highway speeds.</span></div></li>' +
      '<li><div class="ci">✓</div><div><strong>Strap everything down</strong><span>Shifting load changes your weight distribution mid-trip. Secure it before moving.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>Tongue weight target</b>10–15% of total loaded trailer weight. For a 2,000 lb load: 200–300 lbs on the tongue.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function driving() {
  return '<div class="card">' +
    '<div class="kicker">Step 3 · Driving</div>' +
    '<h2>Everything takes longer with a trailer.</h2>' +
    '<ul class="cl">' +
      '<li><div class="ci">1</div><div><strong>Max speed: 55 MPH</strong><span>Trailers add weight and length — slower acceleration, longer stopping distance, less room for error. Stay at or below 55.</span></div></li>' +
      '<li><div class="ci">2</div><div><strong>5-second following distance minimum</strong><span>Braking takes significantly longer when towing. Double the gap you\'d normally keep.</span></div></li>' +
      '<li><div class="ci">3</div><div><strong>Swing wide on turns</strong><span>Trailers track inside your wheels. On right turns especially, swing wide or the trailer clips the curb.</span></div></li>' +
      '<li><div class="ci">4</div><div><strong>Check mirrors constantly</strong><span>Adjust side mirrors before you leave so you can see both the trailer and traffic behind. Large blind spots — signal early, move slowly.</span></div></li>' +
      '<li><div class="ci">5</div><div><strong>No cruise control</strong><span>Cruise can\'t react fast enough to hills or sudden traffic changes. Stay in manual control.</span></div></li>' +
      '<li><div class="ci">6</div><div><strong>Smooth inputs only</strong><span>No jerking the wheel or sudden braking. Every action is amplified by the trailer.</span></div></li>' +
    '</ul>' +
    '<div class="warn"><b>If trailer sway starts</b>Do NOT brake hard or speed up. Ease off the gas, hold the wheel steady, let speed drop naturally. Pull over and recheck your load.</div>' +
    '<button class="btn" onclick="next()">Next →</button>' +
  '</div>';
}

function onroad() {
  return '<div class="card">' +
    '<div class="kicker">Step 4 · Hills & Backing Up</div>' +
    '<h2>Two situations that catch people off guard.</h2>' +
    '<ul class="cl">' +
      '<li><div class="ci">1</div><div><strong>Going uphill — use a lower gear</strong><span>Gives your engine more power without overworking it. Don\'t let it lug at low RPM in a high gear.</span></div></li>' +
      '<li><div class="ci">2</div><div><strong>Going downhill — engine brake, don\'t ride the brakes</strong><span>Shift to a lower gear and let the engine slow you. Riding the brakes overheats them and reduces stopping power when you need it most.</span></div></li>' +
      '<li><div class="ci">3</div><div><strong>Backing up — turn the wheel opposite</strong><span>Want the trailer to go right? Turn the wheel left. Go slow and make small corrections. Use both mirrors.</span></div></li>' +
      '<li><div class="ci">4</div><div><strong>Stop and check at every fuel stop</strong><span>Is the hitch still tight? Chains in place? Tires look okay? Lights still working? Takes 60 seconds and catches problems early.</span></div></li>' +
      '<li><div class="ci">5</div><div><strong>Carry a spare tire for the trailer</strong><span>Trailer tires aren\'t always the same as your vehicle — a flat on the trailer can leave you stranded if you\'re unprepared.</span></div></li>' +
    '</ul>' +
    '<div class="tip"><b>Always wear your seatbelt</b>Non-negotiable. Towing increases the forces involved in any collision.</div>' +
    '<button class="btn" onclick="next()">Take the Quiz →</button>' +
  '</div>';
}

function quiz() {
  var allDone = Object.keys(ans).length === QUIZ.length;
  var correct = QUIZ.filter(function(q, i) { return ans[i] === q.a; }).length;
  var html = '<div class="card"><div class="kicker">Quiz · 5 Questions</div><h2>Quick check.</h2>';
  QUIZ.forEach(function(q, qi) {
    html += '<div class="q-wrap"><div class="q-label">' + (qi+1) + '. ' + q.q + '</div>';
    q.opts.forEach(function(o, oi) {
      var cls = "opt";
      if (ans[qi] === oi) { cls += submitted ? (oi === q.a ? " correct" : " wrong") : " sel"; }
      else if (submitted && oi === q.a) cls += " correct";
      html += '<div class="' + cls + '" onclick="pick(' + qi + ',' + oi + ')"><div class="radio"></div>' + o + '</div>';
    });
    html += '</div>';
  });
  if (!submitted) {
    html += '<button class="btn" ' + (allDone ? '' : 'disabled') + ' onclick="submitQ()">Submit Answers</button>';
  } else if (correct === QUIZ.length) {
    html += '<div class="tip" style="margin-top:16px;"><b>Perfect — 5/5 ✓</b>You know your stuff. Claim your discount below.</div>';
    html += '<button class="btn" onclick="next()">Claim $5 off →</button>';
  } else {
    html += '<div class="warn" style="margin-top:16px;"><b>' + correct + '/5 correct</b>Review the highlighted answers and try again.</div>';
    html += '<button class="btn" onclick="retry()">Try Again</button>';
  }
  return html + '</div>';
}

function done() {
  return '<div class="coupon">' +
    '<div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#6b6b6b;margin-bottom:8px;">Safety certified — here\'s your reward</div>' +
    '<div style="font-size:20px;font-weight:700;color:#262626;">$5 off your rental</div>' +
    '<div class="coupon-code">SAFE5</div>' +
    '<div style="font-size:13px;color:#6b6b6b;">Enter at checkout. One use per customer.</div>' +
  '</div>' +
  '<div class="card" style="text-align:center;padding:28px;">' +
    '<div style="font-size:14px;color:#6b6b6b;margin-bottom:4px;">Ready to book?</div>' +
    '<button class="btn" style="max-width:260px;margin:14px auto 0;" onclick="alert(\'Goes to booking page\')">Reserve a Trailer →</button>' +
  '</div>';
}

render();
</script>
</body>
</html>
